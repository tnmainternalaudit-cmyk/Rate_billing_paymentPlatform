plugins {
  id 'com.android.application'
}

android {
  namespace 'gh.tnma.revenue.mobile'
  compileSdk 34

  defaultConfig {
    applicationId 'gh.tnma.revenue.mobile'
    minSdk 24
    targetSdk 34
    versionCode 1
    versionName '0.1.0'
  }

  buildTypes {
    release {
      minifyEnabled false
      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
    }
  }
}

dependencies {
}
