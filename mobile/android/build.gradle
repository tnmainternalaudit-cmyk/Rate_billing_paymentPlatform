buildscript {
  ext {
    buildToolsVersion = '34.0.0'
    minSdkVersion = 24
    compileSdkVersion = 34
    targetSdkVersion = 34
    kotlinVersion = '1.9.24'
  }
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath 'com.android.tools.build:gradle:8.5.1'
    classpath 'com.facebook.react:react-native-gradle-plugin'
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
  }
}
