version: '3.9'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: tnma_revenue
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - '3000:3000'

  pgadmin:
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tnma.gov.gh
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  pgdata:
